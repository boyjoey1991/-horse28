<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRZ Gold Bank | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="profile">
  <main class="app-shell">
    <div class="phone-frame">
      <div class="screen">
        <div class="top-app-bar">
          <div class="top-brand">
            <span class="top-brand-mark"><i class="bi bi-bank2"></i></span>
            <div class="top-brand-copy">
              <div class="top-brand-name">FRZ Gold</div>
              <div class="top-brand-meta">Member profile</div>
            </div>
          </div>
          <div class="top-app-actions">
            <a class="top-icon-btn" href="transactions.html" aria-label="Notifications">
              <i class="bi bi-bell"></i>
              <span class="top-icon-dot"></span>
            </a>
            <a class="top-icon-btn is-user" href="profile.html" aria-label="Profile">
              <i class="bi bi-person"></i>
            </a>
          </div>
        </div>
        <section class="hero-card mt-3">
          <div class="d-flex align-items-center gap-3 mb-4">
            <div class="avatar-circle">JS</div>
            <div>
              <div class="section-title fs-2 mb-1">Joey San</div>
              <div class="section-subtitle">Black tier member since 2024</div>
            </div>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <div class="metric-card gold-surface h-100">
                <div class="small text-uppercase mb-2">Credit Score</div>
                <div class="value">782</div>
                <div class="small mt-2">Excellent standing</div>
              </div>
            </div>
            <div class="col-6">
              <div class="metric-card dark-surface h-100">
                <div class="small text-uppercase muted mb-2">KYC Status</div>
                <div class="value">Level 3</div>
                <div class="small muted mt-2">Fully verified</div>
              </div>
            </div>
          </div>
        </section>

        <section class="mt-4 d-grid gap-3">
          <div class="list-row">
            <div class="d-flex align-items-center gap-3">
              <span class="row-icon"><i class="bi bi-envelope"></i></span>
              <div>
                <div class="fw-semibold">Email Address</div>
                <div class="small muted">joey@example.com</div>
              </div>
            </div>
            <i class="bi bi-chevron-right muted"></i>
          </div>
          <div class="list-row">
            <div class="d-flex align-items-center gap-3">
              <span class="row-icon"><i class="bi bi-phone"></i></span>
              <div>
                <div class="fw-semibold">Mobile Number</div>
                <div class="small muted">+63 917 555 1440</div>
              </div>
            </div>
            <i class="bi bi-chevron-right muted"></i>
          </div>
          <div class="list-row">
            <div class="d-flex align-items-center gap-3">
              <span class="row-icon"><i class="bi bi-shield-check"></i></span>
              <div>
                <div class="fw-semibold">Security Settings</div>
                <div class="small muted">Biometrics, PIN, trusted devices</div>
              </div>
            </div>
            <i class="bi bi-chevron-right muted"></i>
          </div>
        </section>

        <nav class="bottom-nav">
          <a class="nav-item-mobile" data-page="overview" href="index.html"><i class="bi bi-house-door"></i><span>Home</span></a>
          <a class="nav-item-mobile" data-page="assets" href="assets.html"><i class="bi bi-wallet2"></i><span>Assets</span></a>
          <a class="nav-item-mobile" data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i><span>History</span></a>
          <a class="nav-item-mobile" data-page="referrals" href="referrals.html"><i class="bi bi-people"></i><span>Refer</span></a>
          <a class="nav-item-mobile active" data-page="profile" href="profile.html"><i class="bi bi-person"></i><span>Profile</span></a>
        </nav>
      </div>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>

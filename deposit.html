<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRZ Gold Bank | Deposit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="deposit">
  <main class="app-shell">
    <div class="phone-frame">
      <div class="screen">
        <div class="top-app-bar">
          <div class="top-brand">
            <span class="top-brand-mark"><i class="bi bi-bank2"></i></span>
            <div class="top-brand-copy">
              <div class="top-brand-name">FRZ Gold</div>
              <div class="top-brand-meta">Funding center</div>
            </div>
          </div>
          <div class="top-app-actions">
            <a class="top-icon-btn" href="transactions.html" aria-label="Notifications">
              <i class="bi bi-bell"></i>
              <span class="top-icon-dot"></span>
            </a>
            <a class="top-icon-btn is-user" href="profile.html" aria-label="Profile">
              <i class="bi bi-person"></i>
            </a>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 mb-4">
          <a class="soft-chip" href="index.html"><i class="bi bi-chevron-left"></i> Back</a>
          <span class="brand-chip">Instant Funding</span>
        </div>

        <section class="hero-card">
          <div class="section-title mb-2">Deposit</div>
          <p class="section-subtitle mb-4">Top up your wallet with bank transfer, card, or partner branch cash-in.</p>
          <div class="metric-card gold-surface">
            <div class="small text-uppercase mb-2">Wallet Balance</div>
            <div class="value">₱240,550.75</div>
            <div class="small mt-2">Posting time: under 1 minute</div>
          </div>
        </section>

        <section class="section-panel mt-4">
          <div class="fw-semibold mb-3">Deposit Form</div>
          <div class="d-grid gap-3">
            <div>
              <label class="form-label small muted">Funding source</label>
              <select class="form-select">
                <option>UnionBank ending 1834</option>
                <option>BPI Debit ending 5204</option>
                <option>Cash pickup partner</option>
              </select>
            </div>
            <div>
              <label class="form-label small muted">Amount</label>
              <input class="form-control" type="text" value="₱15,000.00">
            </div>
            <div>
              <label class="form-label small muted">Reference note</label>
              <input class="form-control" type="text" placeholder="Payroll top-up">
            </div>
            <button class="btn btn-gold">Confirm Deposit</button>
          </div>
        </section>

        <section class="mt-4">
          <div class="fw-semibold mb-3">Quick Amounts</div>
          <div class="row g-3">
            <div class="col-6"><div class="list-row justify-content-center fw-semibold">₱2,500</div></div>
            <div class="col-6"><div class="list-row justify-content-center fw-semibold">₱5,000</div></div>
            <div class="col-6"><div class="list-row justify-content-center fw-semibold">₱10,000</div></div>
            <div class="col-6"><div class="list-row justify-content-center fw-semibold">₱20,000</div></div>
          </div>
        </section>

        <nav class="bottom-nav">
          <a class="nav-item-mobile" data-page="overview" href="index.html"><i class="bi bi-house-door"></i><span>Home</span></a>
          <a class="nav-item-mobile active" data-page="deposit" href="deposit.html"><i class="bi bi-arrow-down-left"></i><span>Deposit</span></a>
          <a class="nav-item-mobile" data-page="withdraw" href="withdraw.html"><i class="bi bi-arrow-up-right"></i><span>Withdraw</span></a>
          <a class="nav-item-mobile" data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i><span>History</span></a>
          <a class="nav-item-mobile" data-page="profile" href="profile.html"><i class="bi bi-person"></i><span>Profile</span></a>
        </nav>
      </div>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>

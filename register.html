<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRZ Gold Bank | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="register">
  <main class="app-shell">
    <div class="phone-frame">
      <div class="screen auth-screen">
        <div class="auth-card">
          <span class="brand-chip mb-4"><i class="bi bi-gem"></i> Open Account</span>
          <div class="section-title mb-2">Register</div>
          <p class="section-subtitle mb-4">Create your black-and-gold digital banking profile in minutes.</p>

          <div class="d-grid gap-3">
            <input class="form-control" type="text" placeholder="Full name">
            <input class="form-control" type="email" placeholder="Email address">
            <input class="form-control" type="tel" placeholder="Mobile number">
            <input class="form-control" type="password" placeholder="Create password">
            <button class="btn btn-gold">Register Now</button>
            <a class="btn btn-outline-gold" href="login.html">Already have an account?</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>

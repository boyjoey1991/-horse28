<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRZ Gold Bank | Withdraw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="withdraw">
  <main class="app-shell">
    <div class="phone-frame">
      <div class="screen">
        <div class="top-app-bar">
          <div class="top-brand">
            <span class="top-brand-mark"><i class="bi bi-bank2"></i></span>
            <div class="top-brand-copy">
              <div class="top-brand-name">FRZ Gold</div>
              <div class="top-brand-meta">Cash out desk</div>
            </div>
          </div>
          <div class="top-app-actions">
            <a class="top-icon-btn" href="transactions.html" aria-label="Notifications">
              <i class="bi bi-bell"></i>
              <span class="top-icon-dot"></span>
            </a>
            <a class="top-icon-btn is-user" href="profile.html" aria-label="Profile">
              <i class="bi bi-person"></i>
            </a>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 mb-4">
          <a class="soft-chip" href="index.html"><i class="bi bi-chevron-left"></i> Back</a>
          <span class="brand-chip">Fast Cash Out</span>
        </div>

        <section class="hero-card">
          <div class="section-title mb-2">Withdraw</div>
          <p class="section-subtitle mb-4">Move money to your linked bank account with same-day processing.</p>
          <div class="row g-3">
            <div class="col-6">
              <div class="metric-card dark-surface h-100">
                <div class="small text-uppercase muted mb-2">Transferable</div>
                <div class="value">₱120k</div>
                <div class="small muted mt-2">Daily limit left</div>
              </div>
            </div>
            <div class="col-6">
              <div class="metric-card gold-surface h-100">
                <div class="small text-uppercase mb-2">Fee</div>
                <div class="value">₱15</div>
                <div class="small mt-2">Flat Instapay charge</div>
              </div>
            </div>
          </div>
        </section>

        <section class="section-panel mt-4">
          <div class="fw-semibold mb-3">Withdrawal Details</div>
          <div class="d-grid gap-3">
            <div>
              <label class="form-label small muted">Destination bank</label>
              <select class="form-select">
                <option>BDO Savings •••• 2209</option>
                <option>GCash Wallet •••• 7920</option>
                <option>Maya Wallet •••• 5582</option>
              </select>
            </div>
            <div>
              <label class="form-label small muted">Amount</label>
              <input class="form-control" type="text" value="₱8,000.00">
            </div>
            <div>
              <label class="form-label small muted">Security PIN</label>
              <input class="form-control" type="password" placeholder="Enter 6-digit PIN">
            </div>
            <button class="btn btn-gold">Submit Withdrawal</button>
          </div>
        </section>

        <section class="mt-4">
          <div class="list-row">
            <div>
              <div class="fw-semibold">Estimated arrival</div>
              <div class="small muted">Today before 6:00 PM</div>
            </div>
            <span class="gold-text fw-semibold">Priority</span>
          </div>
        </section>

        <nav class="bottom-nav">
          <a class="nav-item-mobile" data-page="overview" href="index.html"><i class="bi bi-house-door"></i><span>Home</span></a>
          <a class="nav-item-mobile" data-page="deposit" href="deposit.html"><i class="bi bi-arrow-down-left"></i><span>Deposit</span></a>
          <a class="nav-item-mobile active" data-page="withdraw" href="withdraw.html"><i class="bi bi-arrow-up-right"></i><span>Withdraw</span></a>
          <a class="nav-item-mobile" data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i><span>History</span></a>
          <a class="nav-item-mobile" data-page="profile" href="profile.html"><i class="bi bi-person"></i><span>Profile</span></a>
        </nav>
      </div>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>

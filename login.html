<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRZ Gold Bank | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="login">
  <main class="app-shell">
    <div class="phone-frame">
      <div class="screen auth-screen">
        <div class="auth-card">
          <span class="brand-chip mb-4"><i class="bi bi-stars"></i> FRZ Gold Bank</span>
          <div class="section-title mb-2">Welcome Back</div>
          <p class="section-subtitle mb-4">Sign in to your premium mobile banking account.</p>

          <div class="d-grid gap-3">
            <input class="form-control" type="email" placeholder="Email address">
            <input class="form-control" type="password" placeholder="Password">
            <button class="btn btn-gold">Login</button>
            <a class="btn btn-outline-gold" href="register.html">Create Account</a>
          </div>

          <div class="text-center mt-4 small muted">
            Demo access available through the linked app pages.
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>

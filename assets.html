<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRZ Gold Bank | Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="assets">
  <main class="app-shell">
    <div class="phone-frame">
      <div class="screen">
        <div class="top-app-bar">
          <div class="top-brand">
            <span class="top-brand-mark"><i class="bi bi-bank2"></i></span>
            <div class="top-brand-copy">
              <div class="top-brand-name">FRZ Gold</div>
              <div class="top-brand-meta">Wealth overview</div>
            </div>
          </div>
          <div class="top-app-actions">
            <a class="top-icon-btn" href="transactions.html" aria-label="Notifications">
              <i class="bi bi-bell"></i>
              <span class="top-icon-dot"></span>
            </a>
            <a class="top-icon-btn is-user" href="profile.html" aria-label="Profile">
              <i class="bi bi-person"></i>
            </a>
          </div>
        </div>
        <section class="hero-card mt-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="section-title">Assets</div>
            <span class="brand-chip"><i class="bi bi-gem"></i> Wealth</span>
          </div>
          <p class="section-subtitle mb-4">Track liquid funds, locked savings, and long-term positions in one place.</p>
          <div class="balance-figure">₱1.18M</div>
          <div class="small mt-2"><span class="gold-text">+₱82,440</span> unrealized growth this quarter</div>
        </section>

        <section class="mt-4 d-grid gap-3">
          <div class="account-card gold-surface">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="fw-semibold">Gold Reserve</div>
              <i class="bi bi-stars"></i>
            </div>
            <div class="value">₱486,000</div>
            <div class="small mt-2">41% allocation</div>
          </div>
          <div class="account-card dark-surface">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="fw-semibold">Yield Wallet</div>
              <span class="small gold-text">5.2% APY</span>
            </div>
            <div class="value">₱238,500</div>
            <div class="progress-thin mt-3"><span style="width: 62%"></span></div>
          </div>
          <div class="account-card dark-surface">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="fw-semibold">Emergency Fund</div>
              <span class="small muted">Goal 80%</span>
            </div>
            <div class="value">₱120,000</div>
            <div class="progress-thin mt-3"><span style="width: 80%"></span></div>
          </div>
        </section>

        <nav class="bottom-nav">
          <a class="nav-item-mobile" data-page="overview" href="index.html"><i class="bi bi-house-door"></i><span>Home</span></a>
          <a class="nav-item-mobile active" data-page="assets" href="assets.html"><i class="bi bi-wallet2"></i><span>Assets</span></a>
          <a class="nav-item-mobile" data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i><span>History</span></a>
          <a class="nav-item-mobile" data-page="referrals" href="referrals.html"><i class="bi bi-people"></i><span>Refer</span></a>
          <a class="nav-item-mobile" data-page="profile" href="profile.html"><i class="bi bi-person"></i><span>Profile</span></a>
        </nav>
      </div>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
